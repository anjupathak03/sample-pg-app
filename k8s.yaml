##############################################################################
# Sample App — **2 replicas** so Keploy records 2 test-sets
##############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-bug-removeunused
  labels:
    app: k8s-bug-removeunused
spec:
  replicas: 2                          # <-- key: two pods → two test-sets
  selector:
    matchLabels:
      app: k8s-bug-removeunused
  template:
    metadata:
      labels:
        app: k8s-bug-removeunused
    spec:
      containers:
        - name: app
          image: k8s-bug-removeunused:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-bug-removeunused
spec:
  selector:
    app: k8s-bug-removeunused
  ports:
    - port: 80
      targetPort: 8080
